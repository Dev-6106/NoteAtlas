name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Frontend ────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite runs tsc internally via rollup)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_GOOGLE_CLIENT_ID: dummy
          VITE_DEVELOPPER_KEY: dummy
          VITE_RAZORPAY_KEY_ID: dummy
          NODE_OPTIONS: --max-old-space-size=4096

  # ─── Backend ─────────────────────────────────────────────
  build-backend:
    name: Build Backend (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        # Building the Dockerfile compiles TypeScript via tsc as a build step.
        # This catches syntax and type errors without running out of memory,
        # because Docker's build layer caching and Linux GC are much more efficient.
        run: |
          docker build \
            --no-cache \
            --build-arg NODE_OPTIONS="--max-old-space-size=4096" \
            -t noteatlas-backend:ci \
            ./backend
